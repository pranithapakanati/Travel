<!DOCTYPE html>
<html lang="en">

<head>
  <base href="/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bali Packages | Tripon</title>
  <link rel="icon" type="image/png" href="/assets/images/fav_icon.png" />
  <link rel="canonical" href="/packages/bali/" />
  <meta name="description" content="Bali travel packages by duration with Tripon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/all-locations-page.css" />
  <link rel="stylesheet" href="assets/css/package-details.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="location-page" data-bali-packages-hub="true">
  <div class="page">
    <div id="tripon-navbar-zone" class="tripon-include-mount" style="display:contents"></div>

    <main class="all-locations-main-wrap">
      <header class="all-locations-hero">
        <div class="all-locations-hero-overlay"></div>
        <h1>Bali Packages</h1>
      </header>

      <section class="all-locations-main">
        <p style="text-align:center;margin:0 0 24px;"><a href="/packages/">← All packages</a></p>

        <div class="all-locations-grid" aria-label="Bali packages by duration">
          <a class="all-location-card" href="/packages/bali/4-days/">
            <img src="/assets/images/package5.webp" alt="4 Days" />
            <span>4 Days</span>
          </a>
          <a class="all-location-card" href="/packages/bali/5-days/">
            <img src="/assets/images/package.webp" alt="5 Days" />
            <span>5 Days</span>
          </a>
          <a class="all-location-card" href="/packages/bali/6-days/">
            <img src="/assets/images/package2.webp" alt="6 Days" />
            <span>6 Days</span>
          </a>
          <a class="all-location-card" href="/packages/bali/7-days/">
            <img src="/assets/images/package3.webp" alt="7 Days" />
            <span>7 Days</span>
          </a>
          <a class="all-location-card" href="/packages/bali/8-days/">
            <img src="/assets/images/package4.webp" alt="8 Days" />
            <span>8 Days</span>
          </a>
        </div>
      </section>
    </main>

    <div id="tripon-footer-zone" class="tripon-include-mount" style="display:contents"></div>
    <div id="tripon-popups-zone" class="tripon-include-mount" style="display:contents"></div>
  </div>
  <script src="/assets/js/includes.js"></script>
  <script>triponBootMain();</script>
</body>

</html>
